<div class="fp-page">

  <!-- Toast popup -->
  <div class="fp-toast" [class.show]="toast.visible">
    <div class="fp-toast-icon">✓</div>
    <div class="fp-toast-body">
      <p class="fp-toast-title">Email Sent</p>
      <p class="fp-toast-msg">{{ toast.message }}</p>
    </div>
    <button class="fp-toast-close" (click)="toast.visible = false">✕</button>
    <div class="fp-toast-bar"></div>
  </div>

  <div class="fp-card">
    <div class="fp-icon-wrap">
      <span class="fp-icon">🔑</span>
    </div>
    <h2>Forgot Password?</h2>
    <p class="fp-subtitle">Enter the email linked to your account and we'll send you a reset link.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="fp-field" [class.has-error]="email?.touched && email?.invalid">
        <label for="fp-email">Email address</label>
        <input id="fp-email" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email">
        <span class="fp-field-error" *ngIf="email?.touched && email?.errors?.['required']">Email is required.</span>
        <span class="fp-field-error" *ngIf="email?.touched && email?.errors?.['email']">Enter a valid email address.</span>
      </div>

      <!-- API error banner -->
      <div class="fp-alert error" *ngIf="state === 'error'">
        <span class="fp-alert-icon">✕</span>
        <span>{{ errorMessage }}</span>
      </div>

      <button type="submit" class="fp-btn" [disabled]="state === 'loading'">
        <span *ngIf="state !== 'loading'">Send Reset Link</span>
        <span *ngIf="state === 'loading'" class="fp-sending">
          <span class="fp-spinner"></span> Sending email...
        </span>
      </button>
    </form>

    <a routerLink="/login" class="fp-back">← Back to Sign In</a>
  </div>
</div>
