<div style="margin: auto; margin-top: 60px;" class="register-container">
  <div class="register-card">
    <div class="register-header">
      <h2>Create Account 🚀</h2>
      <p>Join us and start your journey today</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="registerUser()" class="register-form" novalidate>
      <div class="form-group">
        <div class="input-wrapper">
          <input formControlName="username" placeholder=" " type="text" id="fullname" autocomplete="name"
            [class.is-invalid]="formControl['username'].touched && formControl['username'].invalid">
          <label for="fullname">Username</label>
          <div class="invalid-feedback" *ngIf="formControl['username'].touched && formControl['username'].invalid">
            Username is required
          </div>
        </div>
      </div>

      <div class="form-group">
        <div class="input-wrapper">
          <input formControlName="email" placeholder=" " type="email" id="email" autocomplete="email"
            [class.is-invalid]="formControl['email'].touched && formControl['email'].invalid">
          <label for="email">Email Address</label>
          <div class="invalid-feedback" *ngIf="formControl['email'].touched && formControl['email'].invalid">
            Email is required
          </div>
        </div>
      </div>

      <div class="form-group">
        <div class="input-wrapper password-wrapper">
          <input formControlName="password" placeholder=" " type="password" id="password" autocomplete="new-password"
            [class.is-invalid]="formControl['password'].touched && formControl['password'].invalid">
          <label for="password">Password</label>
          <div class="invalid-feedback" *ngIf="formControl['password'].touched && formControl['password'].invalid">
            Password is required
          </div>
          <button type="button" class="password-toggle" aria-label="Toggle password visibility">
            <span class="eye-icon"></span>
          </button>
        </div>
      </div>

      <div class="form-group">
        <div class="col-md-6 mb-2">
          <label class="form-label">Role</label>
          <select formControlName="role" class="form-select">
            <option value="Select Role" disabled>Select Role</option>
            <option>ADMIN</option>
            <option>DONOR</option>
            <option>HOSPITAL</option>

          </select>
        </div>
      </div>

      <div class="form-options">
        <label class="remember-wrapper">
          <input type="checkbox" id="terms">
          <span class="checkbox-label">
            <span class="checkmark"></span>
            I agree to Terms & Conditions
          </span>
        </label>
      </div>

      <button type="submit" class="register-btn">
        <span class="btn-text">Register</span>
        <span class="btn-loader"></span>
      </button>

      <p class="login-link">
        Already have an account? <a href="/login">Login</a>
      </p>
    </form>
    <div class="success-message" id="successMessage">
    <div class="success-icon">✓</div>
    <h3>Login Successful!</h3>
    <p>Redirecting to your dashboard...</p>
  </div>
  </div>
  
</div>
